{% extends "admin/change_form.html" %}

{% block content %}
    <h1>{{ title }}</h1>
    <form method="post">{% csrf_token %}
        {{ form.as_p }}

        <!-- The map will be displayed here -->
        <div id="map" style="height: 400px;"></div>

        <!-- Input fields for latitude and longitude -->
        <input type="hidden" name="latitude" id="id_latitude" />
        <input type="hidden" name="longitude" id="id_longitude" />

        <button type="submit">Save Bin</button>
    </form>

    <!-- Add JavaScript for map -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="{% static 'js/osm_map.js' %}"></script>  <!-- Your custom JS file -->

    <script>
        var map = L.map('map').setView([{{ object.latitude|default:"51.505" }}, {{ object.longitude|default:"-0.09" }}], 13);  // Center map at bin location (or default if empty)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var marker = L.marker([{{ object.latitude| default:"51.505" }}, {{ object.longitude|default:"-0.09" }}]).addTo(map);
        marker.dragging.enable();

        marker.on('dragend', function(event) {
            var lat = marker.getLatLng().lat;
            var lng = marker.getLatLng().lng;
            document.getElementById('id_latitude').value = lat;
            document.getElementById('id_longitude').value = lng;
        });
    </script>
{% endblock %}
